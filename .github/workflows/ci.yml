name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  core-tests-linux:
    name: Core Tests (Linux)
    runs-on: ubuntu-latest
    container: swift:6.0.3-jammy
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Run Core Tests
        run: swift test

